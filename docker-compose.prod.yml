services:

  db:
    image: postgres:16
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  streamlit:
    build: .
    restart: always
    env_file:
      - .env
    command: >
      streamlit run streamlit_app/app.py
      --server.port=8501
      --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: