services:

  db:
    image: postgres:16
    container_name: india-market-watch-db-1
    env_file:
      - .env
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
    - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: